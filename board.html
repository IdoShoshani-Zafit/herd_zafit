<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <title>מחשבת העדר 🐄 - מסך כיתה</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root { --primary-mint: #17C3B2; --primary-dark: #129A8C; --secondary-purple: #6c5ce7; --accent-coral: #FE6D73; --bg-light: #F4F9F9; --card-bg: #FFFFFF; --text-main: #227C9D; --text-muted: #7A9E9F; --shadow-soft: 0 15px 40px rgba(34, 124, 157, 0.1); }
    body { font-family: 'Assistant', sans-serif; background-color: var(--bg-light); color: var(--text-main); margin: 0; padding: 30px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    h1 { color: var(--secondary-purple); font-weight: 900; font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 0px #fff; }
    .counter-badge { background: var(--card-bg); color: var(--accent-coral); padding: 15px 30px; border-radius: 50px; font-weight: 800; font-size: 2rem; box-shadow: var(--shadow-soft); border: 3px solid #FEF2F2; display: flex; align-items: center; gap: 15px; }
    .screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.5s ease-out; width: 100%; }
    .screen.active { display: flex; }
    .board-card { background: var(--card-bg); border-radius: 30px; padding: 50px; box-shadow: var(--shadow-soft); text-align: center; width: 100%; max-width: 1200px; border: 2px solid rgba(23, 195, 178, 0.1); position: relative;}
    
    .lobby-title { font-size: 5rem; color: var(--primary-mint); margin-bottom: 10px; font-weight: 900; }
    .lobby-subtitle { font-size: 2.5rem; color: var(--text-muted); }
    
    .join-container { display: flex; justify-content: center; align-items: center; gap: 50px; margin-top: 40px; background: #F4F9F9; padding: 30px; border-radius: 20px; border: 3px dashed var(--primary-mint); }
    .qr-box { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .link-box { text-align: right; }
    .join-link { font-size: 3rem; color: var(--card-bg); font-weight: 900; text-decoration: none; background: var(--primary-mint); padding: 15px 40px; border-radius: 15px; display: inline-block; box-shadow: 0 5px 15px rgba(23, 195, 178, 0.3); border-bottom: 5px solid var(--primary-dark); transition: transform 0.2s; }
    .join-link:hover { transform: scale(1.05); background: #1edcc9; }
    .join-link:active { transform: translateY(3px); border-bottom-width: 2px; margin-top: 3px; }

    .question-title { font-size: 3rem; color: var(--text-muted); margin-bottom: 10px; }
    .category-display { font-size: 6rem; color: var(--secondary-purple); font-weight: 900; margin: 0 0 40px 0; line-height: 1.1; }
    .progress-container { width: 80%; background: #E0F2F1; border-radius: 50px; height: 50px; overflow: hidden; margin: 0 auto; position: relative; border: 2px solid rgba(23, 195, 178, 0.2); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary-mint), #1edcc9); width: 0%; transition: width 0.5s ease-out; }
    .progress-text { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: 800; color: #0A5F5A; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; height: 100%; max-height: 75vh; }
    .results-panel { background: var(--card-bg); border-radius: 30px; padding: 30px; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; overflow-y: auto; position: relative;}
    .panel-title { font-size: 2.5rem; color: var(--secondary-purple); font-weight: 800; margin-top: 0; border-bottom: 3px solid #F4F9F9; padding-bottom: 15px; text-align: center; }
    .word-bar-container { margin-bottom: 15px; position: relative; height: 60px; background: #F4F9F9; border-radius: 15px; overflow: hidden; }
    .word-bar-fill { position: absolute; top: 0; right: 0; bottom: 0; background: var(--primary-mint); z-index: 1; border-radius: 15px 0 0 15px; }
    .word-bar-content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 25px; font-size: 1.8rem; font-weight: 800; color: var(--text-main); }
    .word-bar-count { background: white; padding: 5px 15px; border-radius: 10px; color: var(--primary-dark); }
    .board-leaderboard { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    .board-leaderboard td { padding: 20px; font-size: 2rem; font-weight: 700; background: #F4F9F9; }
    .board-leaderboard td:first-child { border-radius: 0 15px 15px 0; text-align: right; }
    .board-leaderboard td:last-child { border-radius: 15px 0 0 15px; text-align: left; color: var(--primary-dark); font-weight: 900;}
    .medal-1 { background: #FFF9C4 !important; color: #F57F17; }
    .medal-2 { background: #F5F5F5 !important; color: #616161; }
    .medal-3 { background: #EFEBE9 !important; color: #5D4037; }
    .practice-badge { position: absolute; top: 20px; left: 20px; background: #FE6D73; color: white; padding: 10px 20px; border-radius: 20px; font-weight: 900; font-size: 1.5rem; transform: rotate(-10deg); box-shadow: 0 5px 15px rgba(254, 109, 115, 0.4);}
    
    .final-podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 30px; height: 400px; margin-top: 50px;}
    .podium-place { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 200px; border-radius: 20px 20px 0 0; color: white; height: 0%; overflow: hidden; transition: height 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .podium-content { opacity: 0; transition: opacity 0.5s 0.8s; display: flex; flex-direction: column; align-items: center;}
    .podium-place.show .podium-content { opacity: 1; }
    .podium-name { font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); text-align: center; padding: 0 10px;}
    .podium-score { font-size: 1.5rem; margin-bottom: 20px; opacity: 0.9; }
    
    .podium-3 { background: #CD7F32; color: #5D4037; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
    .podium-2 { background: #C0C0C0; color: #616161; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
    .podium-1 { background: #FFD700; color: #D2691E; z-index: 10; box-shadow: 0 -15px 40px rgba(0,0,0,0.2); }
    
    .podium-3.show { height: 50%; }
    .podium-2.show { height: 70%; }
    .podium-1.show { height: 100%; }
    
    .crown { font-size: 4rem; margin-bottom: -15px; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

  <header>
    <h1>מחשבת העדר 🐄</h1>
    <div class="counter-badge">👥 <span id="p-count">0</span> תלמידים מחוברים</div>
  </header>

  <div id="waiting-screen" class="screen active">
    <div class="board-card">
      <div class="lobby-title">מיד נתחיל במשחק... ⏳</div>
      
      <div class="join-container">
        <div class="qr-box">
          <img id="qr-image" src="" alt="סרוק כדי להצטרף" width="220" height="220">
        </div>

        <div class="link-box">
          <p style="font-size: 2rem; color: var(--text-main); margin: 0 0 15px 0; font-weight: 800;">סרקו את הברקוד או:</p>
          <a id="join-link" class="join-link" href="#" target="_blank">לחצו כאן להצטרפות!</a>
        </div>
      </div>

    </div>
  </div>

  <div id="answering-screen" class="screen">
    <div class="board-card">
      <div id="practice-badge-answering" class="practice-badge" style="display:none;">סיבוב ניסיון!</div>
      <div class="question-title">מה לדעתכם רוב הכיתה תענה?</div>
      <div class="category-display" id="display-category">טוען קטגוריה...</div>
      <div style="margin-top: 30px;">
        <p style="font-size: 1.8rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 700;">התקדמות הכיתה:</p>
        <div class="progress-container">
          <div class="progress-fill" id="answers-progress-bar"></div>
          <div class="progress-text" id="answers-progress-text">0 / 0 ענו</div>
        </div>
      </div>
    </div>
  </div>

  <div id="results-screen" class="screen">
    <div class="results-grid">
      <div class="results-panel">
        <div id="practice-badge-results" class="practice-badge" style="display:none; top: 10px; left: 10px; font-size: 1rem;">ללא ניקוד</div>
        <h2 class="panel-title">📊 דעת העדר (התשובות לסיבוב)</h2>
        <div id="board-words-container"></div>
      </div>
      <div class="results-panel">
        <h2 class="panel-title">🏆 מובילי המשחק</h2>
        <table class="board-leaderboard"><tbody id="board-leaderboard-body"></tbody></table>
      </div>
    </div>
  </div>

  <div id="final-screen" class="screen">
    <div class="board-card" style="border: 5px solid #FFD700; background: linear-gradient(to bottom, #ffffff, #fffdf0); padding: 40px;">
      <h1 style="font-size: 4.5rem; color: var(--secondary-purple); margin: 0;">המשחק הסתיים! 🎉</h1>
      <h2 style="font-size: 2.5rem; color: var(--text-muted); margin-top: 5px;">אלו הם אלופי העדר:</h2>
      
      <div class="final-podium-container" id="final-podium-container">
        </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 🔴 === הגדרות המשחק שלך === 🔴
    // החלף את הכתובת כאן לכתובת הגיטהאב האמיתית שתקבל בסוף התהליך
    const GAME_URL = "https://YOUR-USERNAME.github.io/YOUR-REPO-NAME/"; 
    // ===================================

    // מחולל הברקוד (חינמי ובלי התקנות) ועדכון הלינק
    document.getElementById('join-link').href = GAME_URL;
    document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(GAME_URL)}&margin=10`;

    const firebaseConfig = {
      apiKey: "AIzaSyAFw1v_X9xCR7Qsx0lLcw6aIdWa6vN8Uog",
      authDomain: "herd-mentality-c0c0a.firebaseapp.com",
      databaseURL: "https://herd-mentality-c0c0a-default-rtdb.firebaseio.com",
      projectId: "herd-mentality-c0c0a",
      storageBucket: "herd-mentality-c0c0a.firebasestorage.app",
      messagingSenderId: "697436671170",
      appId: "1:697436671170:web:1765156f5c51ca373c3f5b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let totalPlayers = 0; let currentGameState = null; let finalConfettiInterval = null;

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    onValue(ref(db, 'players'), (snapshot) => {
      const players = snapshot.val() || {};
      totalPlayers = Object.keys(players).length;
      document.getElementById('p-count').innerText = totalPlayers;
      if (currentGameState && currentGameState.status === 'RESULTS') renderLeaderboard(players);
    });

    onValue(ref(db, 'gameState'), (snapshot) => {
      const state = snapshot.val();
      if (!state) return;
      const previousState = currentGameState;
      currentGameState = state;
      
      if (finalConfettiInterval && state.status !== 'FINAL_RESULTS') { clearInterval(finalConfettiInterval); }

      if (state.status === 'WAITING') { showScreen('waiting-screen'); } 
      else if (state.status === 'ANSWERING') {
        document.getElementById('display-category').innerText = state.category;
        document.getElementById('practice-badge-answering').style.display = state.isPractice ? 'block' : 'none';
        updateProgress(0);
        onValue(ref(db, `answers/round_${state.round}`), (ansSnap) => {
           if (currentGameState.status === 'ANSWERING') {
               const answersCount = Object.keys(ansSnap.val() || {}).length;
               updateProgress(answersCount);
           }
        });
        showScreen('answering-screen');
      } 
      else if (state.status === 'RESULTS') {
        document.getElementById('practice-badge-results').style.display = state.isPractice ? 'block' : 'none';
        triggerBoardConfetti(3000);
        renderResultsBoard(state.round);
        showScreen('results-screen');
      }
      else if (state.status === 'FINAL_RESULTS') {
        if (!previousState || previousState.status !== 'FINAL_RESULTS') {
          renderAndAnimateFinalPodium();
          showScreen('final-screen');
        }
      }
    });

    function updateProgress(answersCount) {
        const fill = document.getElementById('answers-progress-bar');
        const text = document.getElementById('answers-progress-text');
        const safeTotal = totalPlayers > 0 ? totalPlayers : 1;
        let percentage = (answersCount / safeTotal) * 100;
        if (percentage > 100) percentage = 100;
        fill.style.width = `${percentage}%`;
        text.innerText = `${answersCount} / ${totalPlayers} ענו`;
        if (answersCount >= totalPlayers && totalPlayers > 0) {
            fill.style.background = "#FE6D73"; text.innerText = "כולם ענו! ממתינים למורה..."; text.style.color = "#fff";
        } else {
            fill.style.background = "linear-gradient(90deg, var(--primary-mint), #1edcc9)"; text.style.color = "#0A5F5A";
        }
    }

    async function renderResultsBoard(roundNum) {
      const answersSnap = await get(ref(db, `answers/round_${roundNum}`));
      const playersSnap = await get(ref(db, 'players'));
      const answers = answersSnap.val() || {};
      const players = playersSnap.val() || {};

      let counts = {};
      Object.values(answers).forEach(ans => { counts[ans] = (counts[ans] || 0) + 1; });
      let wordsArr = Object.keys(counts).map(ans => ({ text: ans, count: counts[ans] }));
      wordsArr.sort((a,b) => b.count - a.count);

      const maxCount = wordsArr.length ? wordsArr[0].count : 1;
      const wordsContainer = document.getElementById('board-words-container');
      wordsContainer.innerHTML = '';
      if (wordsArr.length === 0) { wordsContainer.innerHTML = '<div style="text-align:center; font-size:2rem; color:#b2bec3; margin-top:50px;">אין נתונים לסיבוב זה</div>'; } 
      else {
        wordsArr.slice(0, 6).forEach((item) => {
          let pct = (item.count / maxCount) * 100;
          let isWinning = (item.count === maxCount && maxCount > 0);
          let barColor = isWinning ? 'linear-gradient(90deg, #FE6D73, #ff8fa3)' : 'var(--primary-mint)';
          wordsContainer.innerHTML += `<div class="word-bar-container"><div class="word-bar-fill" style="width: ${pct}%; background: ${barColor};"></div><div class="word-bar-content"><span>${isWinning ? '👑 ' : ''}${item.text}</span><span class="word-bar-count">${item.count} קולות</span></div></div>`;
        });
      }
      renderLeaderboard(players);
    }

    function renderLeaderboard(playersObj) {
      let leaderArr = Object.keys(playersObj).map(p => ({ name: p, score: playersObj[p].score || 0 }));
      leaderArr.sort((a,b) => b.score - a.score);
      const tbody = document.getElementById('board-leaderboard-body');
      tbody.innerHTML = '';
      const medals = ['🥇', '🥈', '🥉'];
      leaderArr.slice(0, 7).forEach((p, i) => {
         let rowClass = ""; let rankDisplay = `#${i + 1}`;
         if (i === 0) { rowClass = "medal-1"; rankDisplay = medals[0]; }
         else if (i === 1) { rowClass = "medal-2"; rankDisplay = medals[1]; }
         else if (i === 2) { rowClass = "medal-3"; rankDisplay = medals[2]; }
         tbody.innerHTML += `<tr><td class="${rowClass}"><span style="display:inline-block; width: 40px;">${rankDisplay}</span>${p.name}</td><td class="${rowClass}">${p.score} נק'</td></tr>`;
      });
    }

    async function renderAndAnimateFinalPodium() {
      const snap = await get(ref(db, 'players'));
      const playersObj = snap.val() || {};
      let leaderArr = Object.keys(playersObj).map(p => ({ name: p, score: playersObj[p].score || 0 }));
      leaderArr.sort((a,b) => b.score - a.score);

      const container = document.getElementById('final-podium-container');
      container.innerHTML = '';
      if(leaderArr.length === 0) return;

      let p1 = leaderArr[0] || {name: '-', score: 0};
      let p2 = leaderArr[1] || {name: '-', score: 0};
      let p3 = leaderArr[2] || {name: '-', score: 0};

      container.innerHTML = `
        <div class="podium-place podium-2" id="pod-2">
          <div class="podium-content">
            <div class="podium-name">${p2.name}</div>
            <div class="podium-score">${p2.score} נק'</div>
          </div>
          <div style="font-size: 3rem; margin-bottom: 20px;">🥈</div>
        </div>
        
        <div class="podium-place podium-1" id="pod-1">
          <div class="podium-content">
            <div class="crown">👑</div>
            <div class="podium-name" style="font-size: 3.5rem;">${p1.name}</div>
            <div class="podium-score">${p1.score} נק'</div>
          </div>
          <div style="font-size: 3rem; margin-bottom: 20px;">🥇</div>
        </div>
        
        <div class="podium-place podium-3" id="pod-3">
          <div class="podium-content">
            <div class="podium-name">${p3.name}</div>
            <div class="podium-score">${p3.score} נק'</div>
          </div>
          <div style="font-size: 3rem; margin-bottom: 20px;">🥉</div>
        </div>
      `;

      setTimeout(() => { document.getElementById('pod-3').classList.add('show'); }, 1500); 
      setTimeout(() => { document.getElementById('pod-2').classList.add('show'); }, 4000); 
      setTimeout(() => { 
        document.getElementById('pod-1').classList.add('show'); 
        triggerContinuousConfetti(); 
      }, 7000); 
    }

    function triggerBoardConfetti(durationMillis) {
        var animationEnd = Date.now() + durationMillis;
        var interval = setInterval(function() {
          var timeLeft = animationEnd - Date.now();
          if (timeLeft <= 0) return clearInterval(interval);
          confetti({ particleCount: 50, spread: 360, origin: { x: Math.random(), y: Math.random() - 0.2 }, zIndex: 0 });
        }, 250);
    }

    function triggerContinuousConfetti() {
       finalConfettiInterval = setInterval(function() {
          confetti({ particleCount: 150, spread: 100, origin: { x: 0, y: 0.8 }, colors: ['#FFD700', '#ff8fa3', '#17C3B2']});
          confetti({ particleCount: 150, spread: 100, origin: { x: 1, y: 0.8 }, colors: ['#FFD700', '#ff8fa3', '#17C3B2']});
        }, 1000);
    }
  </script>
</body>
</html>
